<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Community event</title>
<style>
  :root { --bg:#0d1117; --card:#161b22; --border:#30363d; --accent:#e94560; --text:#e6edf3; --muted:#8b949e; }
  * { box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 24px; max-width: 720px; margin-left: auto; margin-right: auto; }
  h1 { font-size: 1.4rem; margin: 0 0 8px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .muted { color: var(--muted); font-size: 0.9rem; }
  .bar-wrap { background: #222; border-radius: 8px; height: 28px; overflow: hidden; margin: 12px 0; }
  .bar { height: 100%; background: linear-gradient(90deg, #9b59b6, var(--accent)); transition: width 0.4s ease; }
  .imgs { display: grid; gap: 12px; }
  .imgs img { max-width: 100%; border-radius: 8px; border: 1px solid var(--border); }
  .stat { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
</style>
<script>/*__INJECT__*/</script>
</head>
<body>
  <div id="root"><p class="muted">Loading event…</p></div>
  <script>
(function () {
  const gid = typeof window.__GUILD_ID__ !== 'undefined' ? window.__GUILD_ID__ : '0';
  const root = document.getElementById('root');
  async function load() {
    try {
      const r = await fetch('/api/public/global-quest?guild_id=' + encodeURIComponent(gid));
      const d = await r.json();
      if (!d.active) {
        root.innerHTML = '<div class="card"><p class="muted">No active community event right now.</p></div>';
        return;
      }
      const pct = Math.min(100, Math.max(0, d.progress_pct || 0));
      const imgs = [];
      if (d.image_url) imgs.push('<img src="'+escapeAttr(d.image_url)+'" alt=""/>');
      if (d.image_url_secondary) imgs.push('<img src="'+escapeAttr(d.image_url_secondary)+'" alt=""/>');
      var actLine = '';
      if (d.activated_at) {
        try {
          actLine = '<p class="muted">Activated (UTC): ' + escapeHtml(new Date(d.activated_at).toISOString().replace('T', ' ').slice(0, 19)) + '</p>';
        } catch (e) { actLine = ''; }
      }
      root.innerHTML =
        '<div class="card">' +
        '<h1>' + escapeHtml(d.title || 'Event') + '</h1>' +
        '<p class="muted">' + (d.scope === 'guild' ? 'Server event' : 'Global event') + '</p>' +
        actLine +
        '<p style="white-space:pre-wrap;">' + escapeHtml(d.description || '') + '</p>' +
        (imgs.length ? '<div class="imgs">'+imgs.join('')+'</div>' : '') +
        '<div class="stat"><span>Progress</span><strong>' + pct.toFixed(1) + '%</strong></div>' +
        '<div class="bar-wrap"><div class="bar" style="width:'+pct+'%"></div></div>' +
        '<div class="stat"><span>Training (scope)</span><span>' + (d.guild_training != null ? d.guild_training : d.total_training) + ' / ' + (d.target_training_points||0) + '</span></div>' +
        '<div class="stat"><span>Days left (UTC)</span><strong>' + (d.days_left != null ? d.days_left : '—') + '</strong></div>' +
        '</div>';
    } catch (e) {
      root.innerHTML = '<div class="card"><p>Could not load event.</p></div>';
    }
  }
  function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }
  function escapeAttr(s) {
    return escapeHtml(s).replace(/"/g, '&quot;');
  }
  load();
})();
  </script>
</body>
</html>
