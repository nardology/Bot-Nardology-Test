<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Connection traits</title>
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,sans-serif;background:#0f0f12;color:#e8e8ef;margin:0;padding:24px;max-width:920px;margin:0 auto;}
    h1{font-size:1.35rem;}
    .card{background:#18181f;border:1px solid #2a2a35;border-radius:12px;padding:16px;margin:12px 0;}
    label{display:block;margin:8px 0 4px;color:#b8b8c8;font-size:0.9rem;}
    input,textarea,select{width:100%;max-width:100%;box-sizing:border-box;padding:10px;border-radius:8px;border:1px solid #333;background:#101018;color:#eee;}
    button{background:#5865f2;color:#fff;border:none;padding:10px 16px;border-radius:8px;cursor:pointer;margin:4px 4px 4px 0;}
    button.secondary{background:#3b3b48;}
    button:disabled{opacity:0.5;cursor:not-allowed;}
    .row{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;}
    .muted{color:#888;font-size:0.85rem;}
    a{color:#7c89ff;}
    .trait{border-left:3px solid #5865f2;padding-left:12px;margin:10px 0;}
    .charimg{max-width:260px;border-radius:10px;border:1px solid #2a2a35;display:block;}
  </style>
  <script>/*__INJECT__*/</script>
</head>
<body>
  <h1>Connection traits</h1>
  <p class="muted">Buy and edit per-character traits. Changes sync with Discord commands.</p>
  <p><a href="/connection/logout">Log out</a></p>

  <div class="card">
    <div class="row">
      <div style="flex:1;min-width:200px;">
        <label>Character</label>
        <select id="charSel"></select>
      </div>
      <div>
        <label>Shards</label>
        <div id="shardBal" style="padding:10px 0;font-weight:600;">—</div>
      </div>
    </div>
    <div id="charImgWrap" style="margin-top:10px;display:none;">
      <img id="charImg" class="charimg" alt="Character image"/>
    </div>
  </div>

  <div class="card" id="shopCard">
    <h2 style="margin-top:0;">Shop</h2>
    <div id="traitList"></div>
  </div>

  <div class="card" id="editCard">
    <h2 style="margin-top:0;">Your details</h2>
    <label>Display name (max 10 words)</label>
    <input id="fld_name" placeholder="Name the bot should use"/>
    <label>Hobbies (one entry per slot, max words enforced server-side)</label>
    <div id="hobbySlots"></div>
    <div id="hobbyBuyWrap" style="display:none;">
      <button type="button" id="btnBuyHobbySlot" class="secondary">Buy +1 hobby slot</button>
      <span id="hobbyBuyPrice" class="muted"></span>
    </div>
    <label>Speech style</label>
    <textarea id="fld_style" rows="5" placeholder="How should this character talk to you?"></textarea>
    <label>Weekly life update</label>
    <textarea id="fld_weekly" rows="4" placeholder="Up to 250 words"></textarea>
    <label>Today's note (daily status trait)</label>
    <textarea id="fld_daily" rows="3" placeholder="Up to 100 words"></textarea>
    <button type="button" id="btnSave">Save fields</button>
    <span id="saveMsg" class="muted"></span>
  </div>

<script>
(async function(){
  const base = window.__PUBLIC_BASE__ || '';
  async function api(path, opts){
    const r = await fetch(base + path, Object.assign({credentials:'same-origin'}, opts || {}));
    return r;
  }
  let state = null;
  let initialized = false;
  function renderHobbySlots(){
    const p = state && state.payload ? state.payload : {};
    const purchased = (state && state.purchased) ? state.purchased : {};
    const hasHobbies = !!purchased.hobbies;
    const totalSlots = Math.max(3, Number((state && state.upgrade_prices && state.upgrade_prices.hobby_slots_total) || 3));
    const hobbies = Array.isArray(p.hobbies) ? p.hobbies : [];
    const host = document.getElementById('hobbySlots');
    host.innerHTML = '';
    if(!hasHobbies){
      const m = document.createElement('div');
      m.className = 'muted';
      m.textContent = 'Buy the Hobbies trait in the shop to unlock hobby slots.';
      host.appendChild(m);
      document.getElementById('hobbyBuyWrap').style.display = 'none';
      return;
    }
    for(let i=0;i<totalSlots;i++){
      const lbl = document.createElement('label');
      lbl.textContent = `Hobby slot ${i+1}`;
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.className = 'hobby-slot';
      inp.placeholder = 'Enter a hobby';
      inp.value = hobbies[i] || '';
      host.appendChild(lbl);
      host.appendChild(inp);
    }
    const buyWrap = document.getElementById('hobbyBuyWrap');
    buyWrap.style.display = 'block';
    document.getElementById('hobbyBuyPrice').textContent = `(Cost: ${Number((state && state.upgrade_prices && state.upgrade_prices.hobby_slot) || 0)} shards)`;
  }
  async function refresh(){
    const sel = document.getElementById('charSel');
    const sid = sel.value || '';
    const r = await api('/connection/api/state?style_id=' + encodeURIComponent(sid));
    state = await r.json();
    if(!r.ok){ alert(state.error || 'load failed'); return; }
    document.getElementById('shardBal').textContent = state.shard_balance ?? '—';
    if(sel.options.length === 0){
      (state.owned_characters||[]).forEach(c=>{
        const o = document.createElement('option');
        o.value = c; o.textContent = c;
        sel.appendChild(o);
      });
      const preferred = (state.selected_style_id || '').trim();
      if(sel.options.length){
        if(preferred){
          for(let i=0;i<sel.options.length;i++){
            if(sel.options[i].value === preferred){ sel.selectedIndex = i; break; }
          }
        }
        if(sel.selectedIndex < 0) sel.selectedIndex = 0;
      }
      if(!initialized && sel.value && sel.value !== sid){
        initialized = true;
        await refresh();
        return;
      }
    }
    initialized = true;
    const imgWrap = document.getElementById('charImgWrap');
    const imgEl = document.getElementById('charImg');
    const imgUrl = (state.style_image_url || '').trim();
    if(imgUrl){
      imgEl.src = imgUrl;
      imgWrap.style.display = 'block';
    }else{
      imgEl.removeAttribute('src');
      imgWrap.style.display = 'none';
    }
    const tl = document.getElementById('traitList');
    tl.innerHTML = '';
    (state.traits||[]).forEach(t=>{
      const d = document.createElement('div');
      d.className = 'trait';
      const owned = (state.purchased||{})[t.trait_id];
      const st = owned ? '✅ Owned' : `⬜ Buy (${t.base_shard_cost} shards)`;
      d.innerHTML = `<strong>${t.title}</strong> <span class="muted">${st}</span><div class="muted">${t.description}</div>` +
        (!owned ? `<button type="button" data-buy="${t.trait_id}">Purchase</button>` : '');
      tl.appendChild(d);
    });
    tl.querySelectorAll('button[data-buy]').forEach(b=>{
      b.onclick = async ()=>{
        const tid = b.getAttribute('data-buy');
        const r2 = await api('/connection/api/purchase', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({style_id: sel.value, trait_id: tid})});
        const j = await r2.json();
        if(!r2.ok){ alert(j.error || 'failed'); return; }
        await refresh();
      };
    });
    const p = state.payload || {};
    document.getElementById('fld_name').value = p.display_name || '';
    renderHobbySlots();
    document.getElementById('fld_style').value = p.speech_style || '';
    document.getElementById('fld_weekly').value = p.weekly_status || '';
    document.getElementById('fld_daily').value = '';
    const day = new Date().toISOString().slice(0,10).replace(/-/g,'');
    if(p.daily_by_day && p.daily_by_day[day]) document.getElementById('fld_daily').value = p.daily_by_day[day];
    document.getElementById('saveMsg').textContent = '';
  }
  document.getElementById('charSel').onchange = refresh;
  document.getElementById('btnBuyHobbySlot').onclick = async ()=>{
    const sel = document.getElementById('charSel');
    const purchased = (state && state.purchased) ? state.purchased : {};
    if(!purchased.hobbies){
      alert('Buy Hobbies first.');
      return;
    }
    const r = await api('/connection/api/purchase', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({style_id: sel.value, trait_id:'hobbies', kind:'hobby_slot'})
    });
    const j = await r.json();
    if(!r.ok){ alert(j.error || 'failed'); return; }
    await refresh();
  };
  document.getElementById('btnSave').onclick = async ()=>{
    const sel = document.getElementById('charSel');
    const hobbies = Array.from(document.querySelectorAll('.hobby-slot'))
      .map(el => (el.value || '').trim())
      .filter(Boolean);
    const purchased = (state && state.purchased) ? state.purchased : {};
    const hasTrait = (tid) => !!purchased[tid];
    const fields = {};
    if(hasTrait('remember_name')){
      fields.display_name = document.getElementById('fld_name').value;
    }
    if(hasTrait('hobbies')){
      fields.hobbies = hobbies;
    }
    if(hasTrait('speech_style')){
      fields.speech_style = document.getElementById('fld_style').value;
    }
    if(hasTrait('weekly_life') || hasTrait('daily_status')){
      fields.weekly_status = document.getElementById('fld_weekly').value;
    }
    if(hasTrait('daily_status')){
      fields.daily_today = document.getElementById('fld_daily').value;
    }
    const r = await api('/connection/api/update', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({style_id: sel.value, fields})});
    const j = await r.json();
    document.getElementById('saveMsg').textContent = j.message || j.error || 'ok';
    if(!r.ok) alert(j.error || 'save failed');
  };
  await refresh();
})();
</script>
</body>
</html>
